<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>编辑 - {{ story_name }}</title>
<style>
    .editor-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .toolbar {
        height: 50px;
        background: #2b2b2b;
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 8px;
        color: white;
        z-index: 10;
        flex-shrink: 0;
    }
    .toolbar button {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        color: white;
        font-size: 12px;
        min-height: 36px;
    }
    .btn-back { background: #546E7A; }
    .btn-add { background: #4CAF50; }
    .btn-save { background: #FBC02D; color: #000 !important; }
    .toolbar input {
        background: #1e1e1e;
        border: 1px solid #555;
        color: white;
        padding: 5px 8px;
        border-radius: 4px;
        font-size: 12px;
    }
    .toolbar label { font-size: 12px; }

    .canvas-container {
        flex: 1;
        overflow: auto;
        position: relative;
        background: #1e1e1e;
    }
    #canvas {
        width: 5000px;
        height: 5000px;
        position: relative;
        background-image:
            linear-gradient(#2a2a2a 1px, transparent 1px),
            linear-gradient(90deg, #2a2a2a 1px, transparent 1px);
        background-size: 40px 40px;
    }

    .node-card {
        position: absolute;
        width: 280px;
        background: #2D2D30;
        border: 2px solid #555;
        border-radius: 8px;
        padding: 10px;
        cursor: move;
        user-select: none;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }
    .node-card:hover { border-color: #64B5F6; }
    .node-card.start-node { border-color: #4CAF50; }

    .node-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }
    .node-title {
        color: #4FC3F7;
        font-size: 13px;
        font-weight: bold;
    }
    .node-delete {
        background: #C62828;
        color: white;
        border: none;
        width: 26px;
        height: 24px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    }

    .node-section {
        margin-bottom: 10px;
    }
    .node-section label {
        color: #90A4AE;
        font-size: 12px;
        display: block;
        margin-bottom: 4px;
    }

    .drop-zone {
        border: 2px dashed #888;
        border-radius: 5px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ddd;
        font-size: 11px;
        cursor: pointer;
        background: #1A237E;
        position: relative;
        overflow: hidden;
    }
    .drop-zone.has-image {
        border-style: solid;
        border-color: #4FC3F7;
    }
    .drop-zone img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }
    .drop-zone input[type="file"] {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
    }

    .char-row {
        display: flex;
        gap: 6px;
    }
    .char-row .drop-zone {
        flex: 1;
        min-height: 70px;
        font-size: 10px;
    }

    .speaker-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
    }
    .speaker-row .drop-zone {
        width: 60px;
        height: 60px;
        min-height: 60px;
        flex-shrink: 0;
    }

    .node-input {
        width: 100%;
        background: #424242;
        border: 1px solid #757575;
        color: white;
        padding: 4px 6px;
        border-radius: 3px;
        margin-bottom: 4px;
        font-size: 12px;
    }
    .node-textarea {
        min-height: 40px;
        resize: vertical;
    }

    .choice-row {
        display: flex;
        gap: 6px;
        margin-bottom: 4px;
        align-items: center;
    }
    .choice-row input {
        flex: 3;
        font-size: 12px;
    }
    .choice-row select {
        flex: 3;
        background: #1B5E20;
        color: white;
        border: 1px solid #4CAF50;
        padding: 3px;
        border-radius: 3px;
        font-size: 12px;
    }
    .choice-row button {
        flex: 1;
        background: #E65100;
        color: white;
        border: none;
        width: 22px;
        height: 22px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
    }

    .add-choice-btn {
        width: 100%;
        background: #1565C0;
        color: white;
        border: none;
        padding: 5px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 4px;
        font-size: 12px;
    }

    svg.connections {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .confirm-box {
        background: #2D2D30;
        border: 2px solid #546E7A;
        border-radius: 12px;
        padding: 20px;
        width: 280px;
        max-width: 90vw;
        text-align: center;
    }
    .confirm-box h3 { color: #ECEFF1; margin-bottom: 15px; }
    .confirm-btns {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 20px;
    }
    .confirm-btns button {
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn-cancel { background: #546E7A; color: white; }
    .btn-confirm { background: #E53935; color: white; }
</style>
</head>
<body>
<div class="editor-container">
    <div class="toolbar">
        <button class="btn-back" onclick="location.href='/'">🔙 返回大厅</button>
        <div style="flex:1"></div>
        <label>🎵</label>
        <input type="text" id="bgmInput" readonly style="width:80px" placeholder="BGM">
        <button onclick="document.getElementById('bgmFile').click()">导入</button>
        <input type="file" id="bgmFile" accept="audio/*" style="display:none" onchange="uploadBGM(this)">

        <label>📜</label>
        <input type="text" id="descInput" style="width:120px" placeholder="简介">

        <button class="btn-add" onclick="addNode()">➕ 新建场景</button>
        <button class="btn-save" onclick="saveProject()">💾 保存项目</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div id="canvas">
            <svg class="connections" id="connections"></svg>
        </div>
    </div>
</div>

<div class="modal-overlay" id="confirmModal">
    <div class="confirm-box">
        <h3 id="confirmText">确定删除吗？</h3>
        <div class="confirm-btns">
            <button class="btn-cancel" onclick="hideConfirm()">取消</button>
            <button class="btn-confirm" onclick="confirmDelete()">🗑️ 确认删除</button>
        </div>
    </div>
</div>

<script>
const STORY_NAME = "{{ story_name }}";
let storyData = null;
let nodes = {};
let nodeIdCounter = 1;
let draggingNode = null;
let dragOffset = {x:0, y:0};
let deleteTarget = null;

// 加载故事数据
fetch(`/api/story/${STORY_NAME}`)
    .then(r => r.json())
    .then(data => {
        storyData = data;
        document.getElementById('bgmInput').value = data.bgm || '';
        document.getElementById('descInput').value = data.desc || '';

        // 加载节点
        Object.entries(data.nodes || {}).forEach(([id, nodeData]) => {
            createNodeElement(id, nodeData);
        });
        updateConnections();
    });

function createNodeElement(id, data) {
    const div = document.createElement('div');
    div.className = 'node-card' + (id === storyData.start_node ? ' start-node' : '');
    div.id = `node-${id}`;
    div.style.left = (data.x || 100) + 'px';
    div.style.top = (data.y || 100) + 'px';

    const isStart = id === storyData.start_node;

    div.innerHTML = `
        <div class="node-header">
            <span class="node-title">${isStart ? '🚩 起点: ' : '🎬 '}${id}</span>
            ${!isStart ? `<button class="node-delete" onclick="showDelete('${id}')">🗑️</button>` : ''}
        </div>

        <div class="node-section">
            <label>🖼️ 场景背景:</label>
            <div class="drop-zone" onclick="this.querySelector('input').click()" id="bg-${id}">
                <span>拖拽/点击上传背景图</span>
                <input type="file" accept="image/*" onchange="uploadImage(this, '${id}', 'bg')">
            </div>
        </div>

        <div class="node-section">
            <label>👥 人物立绘:</label>
            <div class="char-row">
                <div class="drop-zone" onclick="this.querySelector('input').click()" id="char-left-${id}">
                    <span>左</span>
                    <input type="file" accept="image/*" onchange="uploadImage(this, '${id}', 'char-left')">
                </div>
                <div class="drop-zone" onclick="this.querySelector('input').click()" id="char-center-${id}">
                    <span>中</span>
                    <input type="file" accept="image/*" onchange="uploadImage(this, '${id}', 'char-center')">
                </div>
                <div class="drop-zone" onclick="this.querySelector('input').click()" id="char-right-${id}">
                    <span>右</span>
                    <input type="file" accept="image/*" onchange="uploadImage(this, '${id}', 'char-right')">
                </div>
            </div>
        </div>

        <div class="node-section">
            <label>💬 对话与发言人:</label>
            <div class="speaker-row">
                <div class="drop-zone" onclick="this.querySelector('input').click()" id="avatar-${id}">
                    <span>头像</span>
                    <input type="file" accept="image/*" onchange="uploadImage(this, '${id}', 'avatar')">
                </div>
                <div style="flex:1">
                    <input type="text" class="node-input" placeholder="发言人 (留空即旁白)"
                           value="${data.speaker || ''}" id="speaker-${id}">
                </div>
            </div>
            <textarea class="node-input node-textarea" placeholder="剧情台词..." id="text-${id}">${data.text || ''}</textarea>
        </div>

        <div class="node-section">
            <label>🔀 指向下一个场景:</label>
            <div id="choices-${id}"></div>
            <button class="add-choice-btn" onclick="addChoice('${id}')">+ 添加选项</button>
        </div>
    `;

    // 绑定拖拽
    div.addEventListener('mousedown', startDrag);

    document.getElementById('canvas').appendChild(div);
    nodes[id] = {
        element: div,
        data: data,
        choices: []
    };

    // 加载已有图片
    if (data.bg_image) loadImagePreview(`bg-${id}`, data.bg_image);
    if (data.characters?.left) loadImagePreview(`char-left-${id}`, data.characters.left);
    if (data.characters?.center) loadImagePreview(`char-center-${id}`, data.characters.center);
    if (data.characters?.right) loadImagePreview(`char-right-${id}`, data.characters.right);
    if (data.avatar_image) loadImagePreview(`avatar-${id}`, data.avatar_image);

    // 设置拖拽上传区域
    setupDropZone(document.getElementById(`bg-${id}`), id, 'bg');
    setupDropZone(document.getElementById(`char-left-${id}`), id, 'char-left');
    setupDropZone(document.getElementById(`char-center-${id}`), id, 'char-center');
    setupDropZone(document.getElementById(`char-right-${id}`), id, 'char-right');
    setupDropZone(document.getElementById(`avatar-${id}`), id, 'avatar');

    // 加载选项
    (data.choices || []).forEach(c => addChoice(id, c.text, c.next_node));
}

function loadImagePreview(elementId, path) {
    const zone = document.getElementById(elementId);
    // Parse elementId: "bg-scene_1", "avatar-scene_1", "char-left-scene_1", "char-center-scene_1", "char-right-scene_1"
    const parts = elementId.split('-');
    let nodeId, type;
    if (parts[0] === 'char') {
        type = parts[0] + '-' + parts[1]; // "char-left", "char-center", "char-right"
        nodeId = parts.slice(2).join('-'); // "scene_1"
    } else {
        type = parts[0]; // "bg" or "avatar"
        nodeId = parts.slice(1).join('-'); // "scene_1"
    }
    zone.innerHTML = `<img src="/api/story/${STORY_NAME}/asset?path=${encodeURIComponent(path)}"
        onerror="this.parentElement.innerHTML='<span>图片丢失</span>'">
        <input type="file" accept="image/*" style="display:none" onchange="uploadImage(this, '${nodeId}', '${type}')">`;
    zone.classList.add('has-image');
    zone.dataset.path = path;
    // 重新绑定拖拽事件（innerHTML替换后事件丢失）
    setupDropZone(zone, nodeId, type);
}

function uploadImage(input, nodeId, type) {
    const file = input.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    fetch(`/api/story/${STORY_NAME}/upload`, {
        method: 'POST',
        body: formData
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            let elementId;
            if (type === 'bg') elementId = `bg-${nodeId}`;
            else if (type === 'char-left') elementId = `char-left-${nodeId}`;
            else if (type === 'char-center') elementId = `char-center-${nodeId}`;
            else if (type === 'char-right') elementId = `char-right-${nodeId}`;
            else if (type === 'avatar') elementId = `avatar-${nodeId}`;

            loadImagePreview(elementId, data.path);
        }
    });
}

// 拖拽上传支持（匹配桌面版的拖拽图片上传功能）
document.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
document.addEventListener('drop', e => e.preventDefault());

function setupDropZone(zone, nodeId, type) {
    zone.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); zone.style.borderColor = '#4FC3F7'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        zone.style.borderColor = '';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const formData = new FormData();
            formData.append('file', file);
            fetch(`/api/story/${STORY_NAME}/upload`, { method: 'POST', body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    let elementId;
                    if (type === 'bg') elementId = `bg-${nodeId}`;
                    else if (type.startsWith('char-')) elementId = `${type}-${nodeId}`;
                    else if (type === 'avatar') elementId = `avatar-${nodeId}`;
                    loadImagePreview(elementId, data.path);
                }
            });
        }
    });
}

function uploadBGM(input) {
    const file = input.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    fetch(`/api/story/${STORY_NAME}/upload`, {
        method: 'POST',
        body: formData
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            document.getElementById('bgmInput').value = data.path;
        }
    });
}

function addNode() {
    let newId = `scene_${Object.keys(nodes).length + 1}`;
    while (nodes[newId]) newId += '_new';

    createNodeElement(newId, {
        x: 400 + Math.random() * 200,
        y: 150 + Math.random() * 200,
        bg_image: "",
        characters: {left: "", center: "", right: ""},
        avatar_image: "",
        speaker: "",
        text: "",
        choices: []
    });
    updateConnections();
    updateAllChoiceSelects();
}

function addChoice(nodeId, text='', target='') {
    const container = document.getElementById(`choices-${nodeId}`);
    const row = document.createElement('div');
    row.className = 'choice-row';

    const select = document.createElement('select');
    select.className = 'node-input';
    select.style.flex = '3';
    updateChoiceSelect(select, target);

    row.innerHTML = `
        <input type="text" class="node-input" placeholder="选项内容" value="${text}">
    `;
    row.appendChild(select);

    const delBtn = document.createElement('button');
    delBtn.textContent = '✖';
    delBtn.onclick = () => {
        row.remove();
        updateConnections();
    };
    row.appendChild(delBtn);

    container.appendChild(row);
    updateConnections();
}

function updateChoiceSelect(select, currentValue) {
    const keys = Object.keys(nodes);
    select.innerHTML = '<option value="">(剧终)</option>';
    keys.forEach(k => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = k;
        if (k === currentValue) opt.selected = true;
        select.appendChild(opt);
    });
}

function updateAllChoiceSelects() {
    document.querySelectorAll('.choice-row select').forEach(select => {
        const current = select.value;
        updateChoiceSelect(select, current);
    });
}

function startDrag(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' ||
        e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;

    const card = e.currentTarget;
    draggingNode = card;
    dragOffset.x = e.clientX - card.offsetLeft;
    dragOffset.y = e.clientY - card.offsetTop;

    card.style.zIndex = 1000;

    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
}

function onDrag(e) {
    if (!draggingNode) return;
    const container = document.getElementById('canvasContainer');
    const rect = container.getBoundingClientRect();

    let x = e.clientX - rect.left - dragOffset.x + container.scrollLeft;
    let y = e.clientY - rect.top - dragOffset.y + container.scrollTop;

    draggingNode.style.left = x + 'px';
    draggingNode.style.top = y + 'px';
    updateConnections();
}

function stopDrag() {
    if (draggingNode) {
        draggingNode.style.zIndex = '';
        draggingNode = null;
    }
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
}

function updateConnections() {
    const svg = document.getElementById('connections');
    svg.innerHTML = '';

    Object.entries(nodes).forEach(([sourceId, node]) => {
        const sourceEl = node.element;
        const sourceRect = {
            x: sourceEl.offsetLeft + sourceEl.offsetWidth / 2,
            y: sourceEl.offsetTop + sourceEl.offsetHeight
        };

        const choices = sourceEl.querySelectorAll('.choice-row select');
        choices.forEach(select => {
            const targetId = select.value;
            if (!targetId || !nodes[targetId]) return;

            const targetEl = nodes[targetId].element;
            const targetRect = {
                x: targetEl.offsetLeft + targetEl.offsetWidth / 2,
                y: targetEl.offsetTop
            };

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const d = `M ${sourceRect.x} ${sourceRect.y}
                       C ${sourceRect.x} ${sourceRect.y + 50},
                         ${targetRect.x} ${targetRect.y - 50},
                         ${targetRect.x} ${targetRect.y}`;
            path.setAttribute('d', d);
            path.setAttribute('stroke', '#4FC3F7');
            path.setAttribute('stroke-width', '3');
            path.setAttribute('fill', 'none');

            // 箭头
            const angle = Math.atan2(targetRect.y - sourceRect.y, targetRect.x - sourceRect.x);
            const arrowSize = 15;
            const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            const p2 = {x: targetRect.x, y: targetRect.y};
            const p3 = {
                x: p2.x - arrowSize * Math.cos(angle - Math.PI/6),
                y: p2.y - arrowSize * Math.sin(angle - Math.PI/6)
            };
            const p4 = {
                x: p2.x - arrowSize * Math.cos(angle + Math.PI/6),
                y: p2.y - arrowSize * Math.sin(angle + Math.PI/6)
            };
            arrow.setAttribute('points', `${p2.x},${p2.y} ${p3.x},${p3.y} ${p4.x},${p4.y}`);
            arrow.setAttribute('fill', '#4FC3F7');

            svg.appendChild(path);
            svg.appendChild(arrow);
        });
    });
}

function showDelete(nodeId) {
    deleteTarget = nodeId;
    document.getElementById('confirmText').textContent = `确定要删除节点 【${nodeId}】 吗？\n此操作不可恢复！`;
    document.getElementById('confirmModal').classList.add('active');
}

function hideConfirm() {
    document.getElementById('confirmModal').classList.remove('active');
    deleteTarget = null;
}

function confirmDelete() {
    if (!deleteTarget) return;

    const node = nodes[deleteTarget];
    node.element.remove();
    delete nodes[deleteTarget];

    // 清理引用
    Object.values(nodes).forEach(n => {
        n.element.querySelectorAll('.choice-row select').forEach(select => {
            if (select.value === deleteTarget) select.value = '';
        });
    });

    updateConnections();
    updateAllChoiceSelects();
    hideConfirm();
}

function saveProject() {
    const data = {
        title: STORY_NAME,
        desc: document.getElementById('descInput').value,
        bgm: document.getElementById('bgmInput').value,
        start_node: storyData.start_node,
        nodes: {}
    };

    Object.entries(nodes).forEach(([id, node]) => {
        const el = node.element;
        const choices = [];
        el.querySelectorAll('.choice-row').forEach(row => {
            const text = row.querySelector('input').value.trim();
            const target = row.querySelector('select').value;
            if (text) choices.push({text, next_node: target});
        });

        data.nodes[id] = {
            x: parseInt(el.style.left) || 0,
            y: parseInt(el.style.top) || 0,
            bg_image: document.getElementById(`bg-${id}`).dataset.path || '',
            characters: {
                left: document.getElementById(`char-left-${id}`).dataset.path || '',
                center: document.getElementById(`char-center-${id}`).dataset.path || '',
                right: document.getElementById(`char-right-${id}`).dataset.path || ''
            },
            avatar_image: document.getElementById(`avatar-${id}`).dataset.path || '',
            speaker: document.getElementById(`speaker-${id}`).value,
            text: document.getElementById(`text-${id}`).value,
            choices: choices
        };
    });

    fetch(`/api/story/${STORY_NAME}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(() => alert('保存成功！'));
}

// 画布拖拽滚动
let isPanning = false;
let panStart = {x:0, y:0};
let scrollStart = {x:0, y:0};

document.getElementById('canvasContainer').addEventListener('mousedown', e => {
    if (e.target === e.currentTarget || e.target.id === 'canvas') {
        isPanning = true;
        panStart = {x: e.clientX, y: e.clientY};
        const container = e.currentTarget;
        scrollStart = {x: container.scrollLeft, y: container.scrollTop};
        container.style.cursor = 'grabbing';
    }
});

document.addEventListener('mousemove', e => {
    if (!isPanning) return;
    const container = document.getElementById('canvasContainer');
    container.scrollLeft = scrollStart.x - (e.clientX - panStart.x);
    container.scrollTop = scrollStart.y - (e.clientY - panStart.y);
});

document.addEventListener('mouseup', () => {
    isPanning = false;
    document.getElementById('canvasContainer').style.cursor = 'default';
});
</script>
</body>
</html>
