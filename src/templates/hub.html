<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>视觉小说引擎 - 故事大厅</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #F0F4F8;
    color: #2C3E50;
}
.hub-container {
    display: flex;
    height: 100vh;
    padding: 12px;
    gap: 12px;
}
.left-panel {
    flex: 3;
    display: flex;
    flex-direction: column;
    min-width: 0;
}
.left-panel h1 {
    color: #1A237E;
    font-size: 16px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}
.story-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    overflow-y: auto;
    flex: 1;
    padding: 8px;
}
.story-card {
    background: white;
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    border: 2px solid transparent;
}
.story-card:hover, .story-card:active {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    border-color: #2196F3;
}
.story-card.active {
    background: #BBDEFB;
    border-color: #2196F3;
}
.book-icon {
    width: 70px;
    height: 100px;
    margin: 0 auto 8px;
    background: linear-gradient(135deg, #42A5F5, #1565C0);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 12px;
    word-break: break-all;
    padding: 6px;
    position: relative;
    overflow: hidden;
}
.book-icon::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 8px;
    height: 100%;
    background: rgba(0,0,0,0.2);
}
.book-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
}
.story-title {
    color: #2C3E50;
    font-weight: bold;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.btn-group {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}
.btn {
    flex: 1;
    padding: 12px 8px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    color: white;
    min-height: 44px;
}
.btn-new { background: #1E88E5; }
.btn-new:hover { background: #1565C0; }
.btn-edit { background: #F4511E; }
.btn-edit:hover { background: #E64A19; }
.btn-edit:disabled { background: #FFAB91; cursor: not-allowed; }
.btn-ai { background: #8E24AA; }
.btn-ai:hover { background: #7B1FA2; }

.right-card {
    flex: 2;
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    min-width: 0;
}
.cover-box {
    width: 100%;
    height: 140px;
    background: #ECEFF1;
    border: 2px dashed #B0BEC5;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #78909C;
    margin-bottom: 12px;
    overflow: hidden;
    font-size: 14px;
}
.cover-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
}
.detail-title {
    font-size: 18px;
    font-weight: 900;
    color: #2C3E50;
    text-align: center;
    margin-bottom: 10px;
}
.detail-desc {
    background: #F8F9FA;
    padding: 12px;
    border-radius: 8px;
    color: #607D8B;
    line-height: 1.5;
    flex: 1;
    overflow-y: auto;
    font-size: 14px;
}
.btn-play {
    width: 100%;
    height: 48px;
    background: #43A047;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.3s;
    letter-spacing: 1px;
    min-height: 44px;
}
.btn-play:hover, .btn-play:active { background: #388E3C; }
.btn-play:disabled { background: #A5D6A7; cursor: not-allowed; }

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal.active { display: flex; }
.modal-content {
    background: #2D2D30;
    padding: 20px;
    border-radius: 10px;
    border: 2px solid #546E7A;
    width: 300px;
    max-width: 90vw;
}
.modal-content h3 { color: #ECEFF1; margin-bottom: 15px; }
.modal-content input {
    width: 100%;
    padding: 10px;
    background: #424242;
    border: 1px solid #757575;
    border-radius: 6px;
    color: white;
    margin-bottom: 15px;
}
.modal-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}
.modal-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}
.modal-cancel { background: #546E7A; color: white; }
.modal-confirm { background: #E53935; color: white; }
</style>
</head>
<body>

<div class="hub-container">
    <div class="left-panel">
        <h1>📚 我的故事库</h1>
        <div class="story-grid" id="storyGrid">
            {% for story in stories %}
            <div class="story-card" data-name="{{ story.name }}" onclick="selectStory(this)">
                <div class="book-icon">
                    {% if story.cover %}
                    <img src="/api/story/{{ story.name }}/asset?path={{ story.cover|urlencode }}"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                    {% endif %}
                    <span style="display:{% if story.cover %}none{% else %}block{% endif %}">{{ story.title[:6] }}</span>
                </div>
                <div class="story-title">{{ story.title }}</div>
            </div>
            {% endfor %}
        </div>
        <div class="btn-group">
            <button class="btn btn-new" onclick="showNewModal()">✨ 新建故事</button>
            <button class="btn btn-edit" id="btnEdit" disabled onclick="openEditor()">🛠️ 编辑故事</button>
            <button class="btn btn-ai" onclick="location.href='/ai-generator'">🤖 AI 剧本</button>
        </div>
    </div>

    <div class="right-card">
        <div class="cover-box" id="coverBox">
            <span>🖼️ 暂无封面<br>(从首场景背景提取)</span>
        </div>
        <div class="detail-title" id="detailTitle">未选择任何故事</div>
        <div class="detail-desc" id="detailDesc">请在左侧点击一本故事书查看详情。</div>
        <button class="btn-play" id="btnPlay" disabled onclick="openPlayer()">▶️ 开始游玩</button>
    </div>
</div>

<div class="modal" id="newModal">
    <div class="modal-content">
        <h3>新建故事</h3>
        <input type="text" id="newStoryName" placeholder="请输入故事名称..." maxlength="20">
        <div class="modal-btns">
            <button class="modal-btn modal-cancel" onclick="hideNewModal()">取消</button>
            <button class="modal-btn modal-confirm" onclick="createStory()">创建</button>
        </div>
    </div>
</div>

<script>
let selectedStory = null;

function selectStory(card) {
    document.querySelectorAll('.story-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    selectedStory = card.dataset.name;

    document.getElementById('btnEdit').disabled = false;
    document.getElementById('btnPlay').disabled = false;

    fetch(`/api/story/${selectedStory}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('detailTitle').textContent = data.title || selectedStory;
            document.getElementById('detailDesc').textContent = data.desc || '暂无简介...';

            const coverBox = document.getElementById('coverBox');
            const startNode = data.nodes[data.start_node || 'scene_1'];
            if (startNode && startNode.bg_image) {
                coverBox.innerHTML = `<img src="/api/story/${selectedStory}/asset?path=${encodeURIComponent(startNode.bg_image)}"
                    onerror="this.parentElement.innerHTML='<span>🖼️ 图片加载失败</span>'">`;
            } else {
                coverBox.innerHTML = '<span>🖼️ 首个场景暂无背景</span>';
            }
        });
}

function showNewModal() {
    document.getElementById('newModal').classList.add('active');
    document.getElementById('newStoryName').focus();
}

function hideNewModal() {
    document.getElementById('newModal').classList.remove('active');
    document.getElementById('newStoryName').value = '';
}

function createStory() {
    const name = document.getElementById('newStoryName').value.trim();
    if (!name) return;

    fetch('/api/story', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            location.reload();
        }
    });
}

function openEditor() {
    if (selectedStory) window.location.href = `/editor/${selectedStory}`;
}

function openPlayer() {
    if (selectedStory) window.location.href = `/play/${selectedStory}`;
}

document.getElementById('newStoryName')?.addEventListener('keypress', e => {
    if (e.key === 'Enter') createStory();
});
</script>

</body>
</html>
